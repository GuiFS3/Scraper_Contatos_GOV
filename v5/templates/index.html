<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper V5 AI-Powered - Web Interface</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9em;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            display: none;
        }

        .status-area.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .log-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .log-entry.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .log-entry.warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .log-entry.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .download-btn {
            background: #4caf50;
            width: 100%;
            margin-top: 20px;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Scraper V5 AI-Powered</h1>
            <p>Interface Web com IBM watsonx.ai</p>
        </div>

        <!-- Upload Card -->
        <div class="card" id="uploadCard">
            <h2 style="margin-bottom: 20px;">📤 Upload do Arquivo</h2>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Clique ou arraste o arquivo orgaos.txt aqui</div>
                <div class="upload-hint">Formato: SIGLA|Nome do Órgão|URL</div>
            </div>

            <input type="file" id="fileInput" accept=".txt">

            <div id="fileInfo" style="margin-top: 20px; display: none;">
                <div class="alert alert-success">
                    <strong>✓ Arquivo carregado:</strong> <span id="fileName"></span><br>
                    <strong>Órgãos encontrados:</strong> <span id="orgaosCount"></span>
                </div>
                <button class="btn" id="startBtn" onclick="startScraper()">🚀 Iniciar Scraper</button>
            </div>
        </div>

        <!-- Status Card -->
        <div class="card status-area" id="statusCard">
            <h2 style="margin-bottom: 20px;">📊 Status da Execução</h2>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalOrgaos">0</div>
                    <div class="stat-label">Total de Órgãos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="processados">0</div>
                    <div class="stat-label">Processados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="contatosIA">0</div>
                    <div class="stat-label">Via IA</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressBar">0%</div>
            </div>

            <div class="log-area" id="logArea"></div>

            <button class="btn download-btn" id="downloadBtn" style="display: none;" onclick="downloadExcel()">
                📥 Download Excel
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let executionId = null;
        let totalOrgaos = 0;
        let processados = 0;
        let contatosIA = 0;

        // Upload area drag & drop
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            if (!file.name.endsWith('.txt')) {
                alert('Por favor, selecione um arquivo .txt');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Erro: ' + data.error);
                        return;
                    }

                    executionId = data.execution_id;
                    totalOrgaos = data.orgaos_count;

                    document.getElementById('fileName').textContent = file.name;
                    document.getElementById('orgaosCount').textContent = data.orgaos_count;
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('totalOrgaos').textContent = totalOrgaos;
                })
                .catch(error => {
                    alert('Erro ao fazer upload: ' + error);
                });
        }

        function startScraper() {
            if (!executionId) return;

            fetch(`/start/${executionId}`, {
                method: 'POST'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Erro: ' + data.error);
                        return;
                    }

                    document.getElementById('uploadCard').style.display = 'none';
                    document.getElementById('statusCard').classList.add('active');
                    addLog('info', '🚀 Scraper iniciado!');
                })
                .catch(error => {
                    alert('Erro ao iniciar: ' + error);
                });
        }

        function addLog(type, message) {
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function updateProgress() {
            const percent = totalOrgaos > 0 ? Math.round((processados / totalOrgaos) * 100) : 0;
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
        }

        function downloadExcel() {
            window.location.href = `/download/${executionId}`;
        }

        // Socket.IO events
        socket.on('connected', (data) => {
            console.log('Conectado ao servidor');
        });

        socket.on('status_update', (data) => {
            if (data.execution_id !== executionId) return;

            if (data.status === 'running') {
                addLog('info', data.message);
            } else if (data.status === 'completed') {
                addLog('success', '✅ ' + data.message);
                document.getElementById('downloadBtn').style.display = 'block';
            } else if (data.status === 'error') {
                addLog('error', '❌ ' + data.message);
            }
        });

        socket.on('orgao_update', (data) => {
            if (data.execution_id !== executionId) return;

            if (data.status === 'processing') {
                addLog('info', '🔄 ' + data.message);
            } else if (data.status === 'completed') {
                processados++;
                document.getElementById('processados').textContent = processados;
                updateProgress();
                addLog('success', '✓ ' + data.message);
            }
        });
    </script>
</body>

</html>
